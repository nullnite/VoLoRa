CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_LORA=y

CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
# System heap for codec2_create() malloc
CONFIG_HEAP_MEM_POOL_SIZE=32768

# CMSIS-DSP: accelerated FFT for Codec2 (replaces kiss_fft)
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_BASICMATH=y

# FPU context switching — codec2 uses float, multiple threads touch FPU
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Main thread stack (runs lora_config + codec2_create before spawning tasks)
CONFIG_MAIN_STACK_SIZE=16384
